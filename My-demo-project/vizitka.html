<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Алексей Лихачев</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #161616;
      --border: rgba(255,255,255,0.07);
      --accent1: #4f8ef7;
      --accent2: #a855f7;
      --accent3: #06b6d4;
      --text: #f0f0f0;
      --muted: #888;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
    }

    /* ── ambient background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 30%, rgba(79,142,247,.10) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 80% 70%, rgba(168,85,247,.08) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 50% 50%, rgba(6,182,212,.05) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── floating particles ── */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      opacity: 0;
      animation: float linear infinite;
    }
    @keyframes float {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.4; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* ── card ── */
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 52px 40px 44px;
      text-align: center;
      box-shadow:
        0 0 0 1px rgba(255,255,255,.04),
        0 40px 80px rgba(0,0,0,.6),
        0 0 60px rgba(79,142,247,.04);
      animation: cardIn .7s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(.97); }
      to   { opacity: 1; transform: none; }
    }

    /* ── glow ring border ── */
    .card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 29px;
      padding: 1px;
      background: linear-gradient(135deg, rgba(79,142,247,.3), rgba(168,85,247,.2), rgba(6,182,212,.2));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    /* ── avatar ── */
    .avatar-wrap {
      position: relative;
      width: 170px;
      height: 170px;
      margin: 0 auto 28px;
    }
    .avatar-ring {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        var(--accent1),
        var(--accent2),
        var(--accent3),
        var(--accent1)
      );
      animation: spin 4s linear infinite;
      z-index: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .avatar-ring::after {
      content: '';
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      background: var(--surface);
    }
    .avatar {
      position: relative;
      z-index: 1;
      width: 170px;
      height: 170px;
      border-radius: 50%;
      overflow: hidden;
      object-fit: cover;
      object-position: center top;
    }

    /* ── name ── */
    .name {
      font-size: clamp(26px, 6vw, 34px);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.1;
      background: linear-gradient(135deg, #ffffff 0%, var(--accent1) 50%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 24px rgba(79,142,247,.35));
      margin-bottom: 10px;
      animation: namePulse 3s ease-in-out infinite;
    }
    @keyframes namePulse {
      0%, 100% { filter: drop-shadow(0 0 24px rgba(79,142,247,.35)); }
      50%       { filter: drop-shadow(0 0 36px rgba(168,85,247,.5)); }
    }

    /* ── specialization ── */
    .spec {
      font-size: 13.5px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      line-height: 1.5;
      max-width: 320px;
      margin: 0 auto 32px;
    }
    .spec em {
      font-style: normal;
      color: rgba(255,255,255,.45);
    }

    /* ── divider ── */
    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent1), var(--accent2));
      border-radius: 2px;
      margin: 0 auto 32px;
      opacity: .6;
    }

    /* ── social icons ── */
    .socials {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-bottom: 36px;
    }
    .social-btn {
      position: relative;
      width: 52px;
      height: 52px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      text-decoration: none;
      color: var(--muted);
      transition: color .25s, border-color .25s, transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s;
      overflow: hidden;
    }
    .social-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity .25s;
      border-radius: inherit;
    }
    .social-btn:hover {
      transform: translateY(-5px) scale(1.08);
    }
    .social-btn svg { position: relative; z-index: 1; width: 22px; height: 22px; }

    /* Telegram */
    .social-btn.tg::before  { background: linear-gradient(135deg,#2196f3,#1976d2); }
    .social-btn.tg:hover    { color:#fff; border-color:rgba(33,150,243,.5); box-shadow:0 8px 24px rgba(33,150,243,.3); }
    .social-btn.tg:hover::before { opacity:1; }

    /* VK */
    .social-btn.vk::before  { background: linear-gradient(135deg,#4a76a8,#2d5d8e); }
    .social-btn.vk:hover    { color:#fff; border-color:rgba(74,118,168,.5); box-shadow:0 8px 24px rgba(74,118,168,.3); }
    .social-btn.vk:hover::before { opacity:1; }

    /* MAX messenger */
    .social-btn.max::before  { background: linear-gradient(135deg,#00b4ff 0%,#7c3aed 100%); }
    .social-btn.max:hover    { color:#fff; border-color:rgba(124,58,237,.5); box-shadow:0 8px 28px rgba(100,80,240,.4); }
    .social-btn.max:hover::before { opacity:1; }

    /* Email */
    .social-btn.em::before  { background: linear-gradient(135deg,#f97316,#ea580c); }
    .social-btn.em:hover    { color:#fff; border-color:rgba(249,115,22,.5); box-shadow:0 8px 24px rgba(249,115,22,.3); }
    .social-btn.em:hover::before { opacity:1; }

    /* tooltip */
    .social-btn .tip {
      position: absolute;
      bottom: calc(100% + 10px);
      left: 50%;
      transform: translateX(-50%) translateY(4px);
      background: #1e1e1e;
      color: #e0e0e0;
      font-size: 11px;
      font-weight: 600;
      padding: 5px 10px;
      border-radius: 8px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity .2s, transform .2s;
      border: 1px solid rgba(255,255,255,.08);
    }
    .social-btn:hover .tip {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── CTA button ── */
    .cta {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 36px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: .02em;
      color: #fff;
      text-decoration: none;
      overflow: hidden;
      transition: transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s;
      background: linear-gradient(135deg, var(--accent1) 0%, var(--accent2) 100%);
      box-shadow: 0 4px 24px rgba(79,142,247,.35), 0 0 0 0 rgba(79,142,247,.4);
      animation: ctaPulse 2.5s ease-in-out infinite;
    }
    @keyframes ctaPulse {
      0%, 100% { box-shadow: 0 4px 24px rgba(79,142,247,.35), 0 0 0 0 rgba(79,142,247,.4); }
      50%       { box-shadow: 0 4px 32px rgba(168,85,247,.45), 0 0 0 8px rgba(168,85,247,.0); }
    }
    .cta::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.15) 0%, transparent 60%);
      transition: opacity .25s;
    }
    .cta:hover {
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 10px 40px rgba(79,142,247,.5), 0 0 0 4px rgba(79,142,247,.15);
      animation: none;
    }
    .cta:active { transform: translateY(0) scale(.98); }
    .cta svg { width: 20px; height: 20px; flex-shrink: 0; }

    /* ── ripple ── */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,.25);
      transform: scale(0);
      animation: rippleAnim .6s linear;
      pointer-events: none;
    }
    @keyframes rippleAnim {
      to { transform: scale(4); opacity: 0; }
    }

    /* ── footer tag ── */
    .tag {
      margin-top: 28px;
      font-size: 11px;
      color: rgba(255,255,255,.18);
      letter-spacing: .06em;
    }

    /* ── responsive ── */
    @media (max-width: 400px) {
      .card { padding: 40px 24px 36px; }
    }
  </style>
</head>

      p.className = 'particle';
      var size = Math.random() * 4 + 1;
      p.style.cssText = [
        'width:'  + size + 'px',
        'height:' + size + 'px',
        'left:'   + Math.random() * 100 + '%',
        'background:' + colors[Math.floor(Math.random() * colors.length)],
        'animation-duration:' + (Math.random() * 14 + 8) + 's',
        'animation-delay:'    + (Math.random() * 10) + 's',
        'filter: blur(' + (size > 3 ? 1 : 0) + 'px)'
      ].join(';');
      container.appendChild(p);
    }
  })();

  /* ── ripple on CTA ── */
  document.getElementById('ctaBtn').addEventListener('click', function(e) {
    var btn = this;
    var rect = btn.getBoundingClientRect();
    var r = document.createElement('span');
    r.className = 'ripple';
    var size = Math.max(rect.width, rect.height);
    r.style.cssText = [
      'width:'+ size +'px',
      'height:'+ size +'px',
      'left:'+ (e.clientX - rect.left - size/2) +'px',
      'top:' + (e.clientY - rect.top  - size/2) +'px'
    ].join(';');
    btn.appendChild(r);
    setTimeout(function(){ r.remove(); }, 700);
  });
</script>
</body>
</html>
